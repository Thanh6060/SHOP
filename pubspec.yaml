name: shop
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  flutter_native_splash: ^2.4.7
  lottie: ^3.3.3
  smooth_page_indicator: ^2.0.1
  get: ^4.7.3
  iconsax: ^0.0.8
  intl: ^0.20.2
  path_provider: ^2.1.5
  carousel_slider: ^5.1.2
  readmore: ^3.0.0
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  google_sign_in: ^7.2.0
  get_storage: ^2.1.1
  connectivity_plus: ^7.1.1
  shimmer: ^3.0.0
  image_picker: ^1.2.2
  dio: ^5.9.2
  crypto: ^3.0.7
  cached_network_image: ^3.4.1
  google_generative_ai: ^0.4.7
  flutter_branch_sdk: ^9.3.1
  uuid: ^4.5.3
  device_preview: ^1.3.1
  flutter_stripe: ^13.0.0
  flutter_launcher_icons: ^0.14.4
  rename: ^3.1.0
  flutter_login_facebook: ^4.0.0
  flutter_facebook_auth: ^7.1.6
  http: ^1.6.0
  country_code_picker: ^3.4.1
  google_maps_flutter: ^2.17.1
  country_picker: ^2.0.27
  gpt_markdown: ^1.1.7
  speech_to_text: ^7.4.0
  avatar_glow: ^3.0.1
  flutter_rating_bar: ^4.0.1
  firebase_vertexai: ^2.2.0
  qr_flutter: ^4.1.0
  geolocator: ^14.0.2
  flutter_polyline_points: ^3.1.0
  riverpod: ^3.3.2
  latlong2: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:


  uses-material-design: true

  assets:
    - assets/logo/
    - assets/animations/
    - assets/images/
    - assets/icons/payment_methods/
    - assets/icons/categories/
    - assets/banners/
    - assets/products/
    - assets/brands/



  fonts:
    - family: 'Nunito'
      fonts:
        - asset: assets/fonts/Nunito-Light.ttf
          weight: 300
        - asset: assets/fonts/Nunito-Regular.ttf
          weight: 400
        - asset: assets/fonts/Nunito-Italic.ttf
          style: italic
        - asset: assets/fonts/Nunito-Medium.ttf
          weight: 500
        - asset: assets/fonts/Nunito-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 800